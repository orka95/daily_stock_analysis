# Deep Research Strategy / 深度研究策略

name: deep_research
display_name: 深度研究
description: 多輪網路搜尋 + 網頁全文擷取，產出產業鏈、競爭對手、未來投資計畫、買賣決策框架的完整研究報告。
category: framework
core_rules: [5, 6]
required_tools:
  - search_stock_news
  - search_comprehensive_intel
  - fetch_webpage
  - search_local_news
  - get_realtime_quote
  - get_stock_info

instructions: |
  **深度研究策略（Deep Research Strategy）**

  適用場景：
  - 用戶想深入了解一家公司的全貌，而非僅看技術面。
  - 需要產業鏈分析、競爭對手比較、未來投資計畫等深度資訊。
  - 輸入格式通常為「深度研究 TW4919」或「深度研究 AAPL」。

  **重要指令**：
  - 你必須進行多輪搜尋，每輪根據上一輪結果決定下一步搜什麼。
  - 對有價值的搜尋結果，使用 `fetch_webpage` 讀取全文以獲取細節。
  - 使用 `search_local_news` 搜尋本地新聞源取得最新動態。
  - 全程使用繁體中文輸出。

  分析框架（嚴格按順序執行）：

  1. **階段一：公司基本面**
     - 使用 `get_realtime_quote` 和 `get_stock_info` 取得基本資料。
     - 使用 `search_stock_news` 搜尋「{公司名} 主要業務 產品線 營收結構」。
     - 使用 `search_stock_news` 搜尋「{公司名} 母公司 子公司 轉投資」。
     - 使用 `search_local_news` 取得本地新聞源的最新動態。
     - 對最有價值的 1-2 個搜尋結果，用 `fetch_webpage` 讀取全文。

  2. **階段二：產業鏈與競爭對手**
     - 使用 `search_stock_news` 搜尋「{公司名} 競爭對手 市佔率 {主要產品}」。
     - 使用 `search_stock_news` 搜尋「{公司名} 供應鏈 上下游 客戶」。
     - 對關鍵分析文章用 `fetch_webpage` 讀取全文，取得具體數據。
     - 整理出競爭格局表（市佔率、技術差異、策略差異）。

  3. **階段三：重大事件與未來計畫**
     - 使用 `search_stock_news` 搜尋「{公司名} 法說會 展望 2025 2026」。
     - 使用 `search_stock_news` 搜尋「{公司名} 併購 擴廠 資本支出 投資計畫」。
     - 使用 `search_stock_news` 搜尋「{公司名} 法人 目標價 毛利率」。
     - 對有具體數據的文章用 `fetch_webpage` 深入讀取。

  4. **階段四：綜合研究報告**
     整合所有資訊，輸出以下結構化報告：

     ```
     ## 一、公司概覽
     - 主要業務與產品線
     - 營收結構（各產品佔比）
     - 集團關係（母公司/子公司）

     ## 二、產業鏈與競爭格局
     - 所處產業與市場規模
     - 主要競爭對手及市佔率比較（表格）
     - 技術差異與策略差異
     - 上下游供應鏈關係

     ## 三、重大事件與未來計畫
     - 近期重大事件（併購、擴廠、新產品）
     - 未來投資計畫與時程
     - 法人預估（營收、毛利率、EPS）

     ## 四、買賣決策觀察框架
     - 關鍵追蹤指標（月/季定期檢視）
     - 潛在買進訊號
     - 潛在賣出/警示訊號
     - 重要時間節點

     ## 五、風險提示
     - 主要風險因素
     - 免責聲明
     ```

  注意事項：
  - 每個階段至少進行 2-3 次搜尋。
  - 不要跳過任何階段，即使某階段搜尋結果較少。
  - 報告中的數據必須標明來源。
  - 最後必須附上免責聲明：「以上僅為研究整理，不構成投資建議。」
